<!DOCTYPE html>
<html>
<head>
    <title>To Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
.task-card {
    transition: all 0.2s ease;
}

.task-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.fade-in {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body style="background: #0f172a; color: white;">

<div class="container py-5" style="max-width: 600px;">

    <!-- Заголовок -->
    <div class="text-center mb-4">
        <h1>📝 My Tasks</h1>
        <p style="color: #94a3b8;">Управляй своими задачами</p>
    </div>

    <!-- Добавление задачи -->
    <div class="card p-3 mb-4" style="background:#1e293b; border:none;">
        <form method="POST" class="d-flex gap-2">
            {% csrf_token %}
            <input type="text" name="title" class="form-control" placeholder="Новая задача...">
            <button class="btn btn-primary">+</button>
        </form>
    </div>

    <!-- Список задач -->
    {% for task in tasks %}
        <div class="card task-card fade-in mb-2 p-3 d-flex justify-content-between align-items-center"
             style="background:#1e293b; border:none;">

            <div>
                {% if task.completed %}
                    <s style="color:#94a3b8;">{{ task.title }}</s>
                {% else %}
                    <span>{{ task.title }}</span>
                {% endif %}
            </div>

            <div class="d-flex gap-2">

                <!-- кнопка удалить -->
                <a href="delete/{{ task.id }}" class="btn btn-sm btn-danger">❌</a>
                <a href="complete/{{ task.id }}" class="btn btn-sm btn-success">✔</a>

            </div>

        </div>
    {% endfor %}

    <!-- выход -->
    <div class="text-center mt-4">
        <a href="/logout/" class="btn btn-outline-light">Выйти</a>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<div class="d-flex gap-2 mb-3">

<a href="?filter=all" class="btn btn-light btn-sm">Все</a>
<a href="?filter=active" class="btn btn-warning btn-sm">Активные</a>
<a href="?filter=done" class="btn btn-success btn-sm">Выполненные</a>

</div>
<ul id="task-list" class="list-group mt-3">
<script>
new Sortable(document.getElementById("task-list"), {
    animation: 150
});
</script>
</body>
</html>
